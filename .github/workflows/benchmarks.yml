name: Benchmarks

on:
  # Run every night at 03:00 UTC - quiet runner hours, results ready by
  # morning. Catches regressions roughly within a day of landing.
  schedule:
    - cron: '0 3 * * *'
  # Manual trigger so contributors can validate a change before pushing.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build shadow JAR
        run: ./gradlew shadowJar --no-daemon --stacktrace

      - name: Run JMH microbenchmarks
        run: ./gradlew :benchmarks:jmh --no-daemon --stacktrace

      - name: Run soak + timeout tests
        run: ./gradlew :benchmarks:test --no-daemon --stacktrace

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-reports
          path: |
            benchmarks/build/reports
            benchmarks/build/test-results
          retention-days: 90
          if-no-files-found: ignore
