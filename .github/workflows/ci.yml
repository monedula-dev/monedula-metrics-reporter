name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on PR pushes; let every main commit complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Validate the Gradle wrapper jar against the known-good checksum maintained
  # by Gradle. Prevents a tampered gradle-wrapper.jar (the most common
  # supply-chain attack vector for Gradle projects) from compromising CI runs.
  validate-wrapper:
    name: Validate Gradle wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6

  # Enforce Spotless / palantir-java-format on every PR. Fast (~10 s), runs
  # once per CI - the test matrix doesn't repeat it.
  spotless:
    name: Spotless check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run spotlessCheck
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

  # Surface vulnerable or disallowed-license dependencies introduced by a PR.
  # Runs only on pull_request events (the action's API requires a base ref).
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          # Fail the check on any high-severity vulnerability. Moderate/low
          # appear as warnings but do not block the PR.
          fail-on-severity: high

  # Unit + integration tests across the supported JDK and Kafka surface.
  # README claims Java 17+ and Apache Kafka 3.x / 4.x — this matrix keeps that claim honest.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
        kafka: ['3.7.0', '3.9.0', '4.2.0', '4.3.0']
    name: test (JDK ${{ matrix.java }} / Kafka ${{ matrix.kafka }})
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build shadow JAR
        run: ./gradlew shadowJar -PkafkaVersion=${{ matrix.kafka }} --no-daemon --stacktrace

      - name: Unit + integration tests
        run: ./gradlew :test -PkafkaVersion=${{ matrix.kafka }} --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-jdk${{ matrix.java }}-kafka${{ matrix.kafka }}
          path: |
            build/reports/tests
            build/test-results
            build/reports/jacoco
          retention-days: 7
          if-no-files-found: ignore

  # End-to-end test runs once against the default Kafka version. It launches Kafka, the
  # OTel collector, and Prometheus via docker-compose / Testcontainers and asserts metrics
  # land in Prometheus. Multiplying it by every matrix cell would explode runtime without
  # meaningfully more coverage — the reporter's contact surface with Kafka is already
  # covered by the matrix above.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: End-to-end test
        run: ./gradlew :e2e:test --no-daemon --stacktrace

      - name: Upload e2e reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-reports
          path: |
            e2e/build/reports/tests
            e2e/build/test-results
          retention-days: 7
          if-no-files-found: ignore
